<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blush & Glow - Maquillaje Premium</title>
    <link rel="stylesheet" href="css/estilo1.css">
<body>
    <!-- Navbar -->
    <nav>
        <div class="logo">✨ Blush & Glow</div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#productos">Productos</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
        <div class="cart-icon">🛒</div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="inicio">
        <h1>Realza tu Belleza Natural</h1>
        <p>Maquillaje premium de la mejor calidad para ti</p>
        <button class="btn" onclick="scrollToProducts()">Comprar Ahora</button>
    </section>

    <!-- Products Section -->
    <section class="products" id="productos">
        <h2>Nuestros Productos</h2>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- Footer -->
    <footer id="contacto">
        <p>&copy; 2024 Blush & Glow. Todos los derechos reservados.</p>
        <p>Síguenos en <a href="#">Instagram</a> | <a href="#">Facebook</a></p>
    </footer>

    <script>
        const products = [
            { name: 'Blush Rosado', price: '$12.990', emoji: '💄' },
            { name: 'Iluminador', price: '$14.990', emoji: '✨' },
            { name: 'Base Liquida', price: '$16.990', emoji: '💅' },
            { name: 'Labial Matte', price: '$10.990', emoji: '💋' },
            { name: 'Sombras Ojos', price: '$13.990', emoji: '👁️' },
            { name: 'Delineador', price: '$9.990', emoji: '🖊️' }
        ];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <button onclick="addToCart('${product.name}')">Agregar al Carrito</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function scrollToProducts() {
            document.getElementById('productos').scrollIntoView({ behavior: 'smooth' });
        }

        function addToCart(productName) {
            alert(`${productName} agregado al carrito`);
        }

        renderProducts();
    </script>
</body>
</html>
